schema_version = 1
starter_version = "v0.1.6"
description = "Minimal CodexHome starter surface with generic LLM wiki lifecycle core."
default_class = "reserved_user"
prune = "manual"
matching = "specific_before_glob"

# Sync tooling must prefer the most specific matching path entry before broader
# reserved globs. The default class remains reserved_user for unmatched paths.

[verification]
commands = [
  "uv run python scripts/wiki_lint.py",
  "uv run python scripts/wiki_lint.py --profile autonomous",
  "uv run python scripts/tests/test_wiki_lint.py",
  "uv run python scripts/tests/test_system_lock.py",
  "uv run python scripts/tests/test_sync_system.py",
  "uv run python scripts/tests/test_release_hygiene.py",
  "uv run python scripts/tests/test_bootstrap_instance.py",
  "uv run python scripts/tests/test_publish_instance.py",
]

[[paths]]
path = "AGENTS.md"
class = "managed"
content = "text"
note = "Portable agent rules only."

